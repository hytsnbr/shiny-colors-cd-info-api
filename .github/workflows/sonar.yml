name: SonarQube Analysis

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - "*"

jobs:
  sonarqube:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      
      - name: Deno Setup
        uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.

      - name: Collect Coverage
        run: |
          # 1. テスト実行
          deno task coverage
          
          # 2. 絶対パスを相対パスに置換
          deno coverage coverage_result --lcov | sed "s|SF:$GITHUB_WORKSPACE/|SF:|g" > lcov.info

          # 3. lcov.infoの内容を表示（デバッグ用）
          head -n 5 lcov.info

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
